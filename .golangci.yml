run:
  timeout: 5m
  tests: true
  go: '1.24'

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true
  govet:
    enable-all: true
    disable:
      - shadow # Shadowing can be tricky during version transitions
  gofmt:
    simplify: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
